name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # `--all-features` so the `e2e`-gated tier and its helper worker
      # (tests/e2e.rs, src/bin/e2e_helper.rs) are linted here too, including their
      # cfg(unix) paths on this Linux runner.
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --all-targets
      - run: cargo test

  coverage:
    name: coverage (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Data source, not a gate: no --fail-under-* threshold is set below, and
    # continue-on-error absorbs any step failure (install hiccup, instrumented
    # build/test failure) so this job never turns red and never blocks a merge —
    # it is not a required check, and the `test`/`clippy`/`fmt`/other jobs above
    # are unaffected either way.
    #
    # Scope mirrors the `test` job above: the default `cargo test` set (the
    # `src/*.rs` unit tests, which now live in the crate's library target and
    # are picked up by a plain `cargo test`, plus the through-the-binary
    # integration tests under `tests/`; see docs/architecture.md, "Test
    # tiers"). ubuntu-latest + windows-latest covers both the `cfg(unix)` and
    # `cfg(windows)` platform halves. The feature-gated `e2e` tier is out of
    # scope here too, same reasoning as `test`: it spawns real, multi-level
    # process trees and is heavier — a separate concern from this job's data.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2
        with:
          tool: cargo-llvm-cov
      # Instrument and run the tests once; the two `report` steps below reuse
      # this same profile data instead of re-running the suite (the documented
      # `--no-report` + `report` split, see the cargo-llvm-cov README's "Merge
      # coverages generated under different test conditions").
      - name: Run instrumented tests
        run: cargo llvm-cov --no-report
      - name: Coverage summary
        shell: bash
        run: |
          {
            echo "### Coverage summary (${{ matrix.os }})"
            echo '```text'
            cargo llvm-cov report
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Coverage HTML report
        run: cargo llvm-cov report --html --output-dir coverage-report
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage-report

  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # The tier spawns real, multi-level process trees and polls for teardown, so
    # it runs longer than the unit tests; bound the whole job well above that.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      # The opt-in end-to-end containment tier (tests/e2e.rs, `e2e` feature):
      # leaked-grandchild reaping through the built binary, abrupt runner death,
      # a descendant holding the stdout pipe, rapid PID-reuse churn, `inspect` over
      # the live control plane, two concurrent runs contained independently,
      # control-plane `cancel`/`kill` reaping only the target run, a Ctrl-C cancel
      # (Unix), a `run` nested inside an outer Job Object (Windows), real-console
      # (Windows) and pseudo-terminal (Unix) `--inherit-stdio` smoke tests, and
      # the MSBuild node-reuse worker shape
      # (a synthetic worker cross-platform, plus a real
      # `dotnet build` when a `dotnet` SDK is present). Kept out of the default
      # `cargo test` job above (heavier, real process trees); `--nocapture` surfaces
      # each platform skip (e.g. the `dotnet`-absent skip).
      - run: cargo test --features e2e --test e2e -- --nocapture

  # release.yml's build-artifacts matrix ships six target triplets; the
  # `test` job above only exercises each runner's host triplet (x86_64 on
  # ubuntu-latest/windows-latest, aarch64 on macos-latest — the default
  # macos-latest image is Apple Silicon). This job cross-checks the three
  # remaining release targets with `cargo check --all-targets` (no test run,
  # just a compile check) so a platform regression surfaces here instead of on
  # release day. musl and aarch64-linux use the same apt cross toolchains as
  # release.yml's build-artifacts job; aarch64-pc-windows-msvc cross-compiles
  # from windows-latest (the ARM64 MSVC tools are present on the hosted
  # image, same as release.yml).
  target-check:
    name: target-check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt: gcc-aarch64-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            apt: musl-tools
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      # Cross toolchain for the Linux targets that need one: the aarch64 glibc
      # linker, or musl's libc for the static build. Native ubuntu-latest
      # matrix entries skip this (no `apt` set).
      - name: Install Linux cross toolchain
        if: ${{ matrix.apt != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}
      # The aarch64 glibc linker override only applies to that exact triple;
      # cargo ignores it for every other target in this matrix.
      - name: cargo check --all-targets
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo check --all-targets --target ${{ matrix.target }}

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Scan the dependency tree for security advisories and banned/duplicate crates.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories bans

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Verify the crate still builds on its declared Minimum Supported Rust
      # Version. Keep `toolchain` in sync with `rust-version` in Cargo.toml.
      # (`@master` + the `toolchain` input accepts a two-component "1.88"; the
      # version-branch refs require a full patch version like `@1.88.0`.)
      - uses: dtolnay/rust-toolchain@master # rolling toolchain selector — intentionally unpinned
        with:
          toolchain: "1.88"
      # rust-toolchain.toml tracks stable and would otherwise win here; remove it
      # so cargo uses the 1.85 toolchain installed above and truly tests the floor.
      - run: rm -f rust-toolchain.toml
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --all-targets
