name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a new push doesn't queue behind stale CI.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  yaml-lint:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a full commit SHA (supply-chain hardening); the
      # trailing comment records the human-readable version. Dependabot bumps the
      # SHA and updates the comment on its weekly run.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: pip install yamllint

      # Config is .yamllint.yml — tuned for Actions YAML. Real defects (tabs,
      # duplicate keys, bad indentation) fail; cosmetic line-length stays a
      # non-failing warning.
      - name: Lint YAML
        run: yamllint .

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable # rolling toolchain selector — intentionally unpinned
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --all-targets
      - run: cargo test

  audit:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Scan the dependency tree for security advisories and banned/duplicate crates.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2
        with:
          command: check advisories bans

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Verify the crate still builds on its declared Minimum Supported Rust
      # Version. Keep `toolchain` in sync with `rust-version` in Cargo.toml.
      # (`@master` + the `toolchain` input accepts a two-component "1.88"; the
      # version-branch refs require a full patch version like `@1.88.0`.)
      - uses: dtolnay/rust-toolchain@master # rolling toolchain selector — intentionally unpinned
        with:
          toolchain: "1.88"
      # rust-toolchain.toml tracks stable and would otherwise win here; remove it
      # so cargo uses the 1.85 toolchain installed above and truly tests the floor.
      - run: rm -f rust-toolchain.toml
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --all-targets
